
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg, #351f67 0%, #eacff8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }
        
        .header { text-align: center; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .logo-container { max-width: 840px; width: 100%; margin-bottom: 5px; }
        .site-logo { width: 100%; height: auto; display: block; mix-blend-mode: screen; }

        /* --- SIDE BY SIDE LAYOUT --- */
        .top-row-container { display: flex; gap: 20px; margin-bottom: 25px; align-items: stretch; }
        .instructions, .controls-section { flex: 1; margin-bottom: 0; }

        .instructions {
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 12px; padding: 22px 25px;
            display: flex; flex-direction: column;
        }
        .instructions h3 {
            color: white; margin-bottom: 15px; font-size: 18px;
            font-family: 'Fredoka One', cursive; letter-spacing: 0.5px;
        }
        .instructions-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-grow: 1; }
        .instruction-item { display: flex; gap: 12px; align-items: flex-start; color: white; font-size: 14px; }
        .instruction-number {
            background: white; color: #667eea; width: 26px; height: 26px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-weight: 700; font-family: 'Fredoka One', cursive; font-size: 13px;
        }

        .controls-section {
            background: white; border-radius: 12px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: center;
        }
        .control-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: #667eea; font-weight: 600; margin-bottom: 8px; display: block; }
        .control-input {
            width: 100%; padding: 10px 15px; background: white; border: 2px solid #e0e0e0;
            color: #333; font-family: 'Fredoka', sans-serif; font-size: 15px; border-radius: 8px;
        }
        .range-inputs { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #e0e0e0; }
        .range-input-group { flex: 1; }
        .range-input-group label { font-size: 11px; text-transform: uppercase; color: #667eea; font-weight: 600; }
        .range-input-group input { width: 100%; padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; }

        /* --- TIMELINE --- */
        .timeline-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .timeline-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .info-value { font-size: 24px; font-weight: 600; color: #667eea; font-family: 'Fredoka One', cursive; }
        
        .timeline-ruler-wrapper {
            background: #f8f9ff; border-radius: 8px 8px 0 0; border: 2px solid #e0e0e0;
            height: 100px; position: relative; overflow: hidden;
        }
        .timeline-ruler { position: relative; width: 100%; height: 100%; }
        
        .playhead {
            position: absolute; top: 0; width: 2px; height: 100%;
            background: #667eea; z-index: 30; pointer-events: none;
        }
        .playhead::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid #667eea;
        }

        /* FIX 1: Tooltip moved down so it's not clipped at top */
        .marker-tooltip {
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2e; color: white; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; display: none; z-index: 100;
            white-space: nowrap; pointer-events: none;
        }
        .marker-tooltip::before {
            content: ''; position: absolute;
            bottom: 100%; left: 50%; transform: translateX(-50%);
            border-left: 5px solid transparent; border-right: 5px solid transparent;
            border-bottom: 6px solid #1e1e2e;
        }

        /* FIX 2: Scale & Pan label in scrubber */
        .scrubber-section {
            background: #1e1e2e; border-radius: 0 0 8px 8px; padding: 10px;
            margin-bottom: 25px; display: flex; align-items: center; gap: 10px;
        }
        .scrubber-label {
            color: rgba(255,255,255,0.45); font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; font-weight: 600; user-select: none;
        }
        .scrubber-track { flex: 1; background: rgba(255,255,255,0.1); border-radius: 4px; height: 20px; position: relative; }
        .scrubber-bar { position: absolute; top: 2px; height: 16px; background: linear-gradient(90deg, #eacff8, #667eea); border-radius: 3px; cursor: grab; }
        .scrubber-handle { position: absolute; top: 0; bottom: 0; width: 10px; cursor: ew-resize; background: rgba(255,255,255,0.3); }
        .scrubber-handle.left { left: 0; } .scrubber-handle.right { right: 0; }

        .bottom-panel { background: white; border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .control-buttons { display: flex; gap: 10px; margin-left: auto; }
        .start-button { padding: 12px 25px; background: #667eea; border: none; color: white; border-radius: 8px; cursor: pointer; font-family: 'Fredoka', sans-serif; font-weight: 600; }
        .reset-button { padding: 12px 25px; background: white; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-family: 'Fredoka', sans-serif; }

        .countdown-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .countdown-overlay.active { display: flex; }
        .countdown-number { font-family: 'Fredoka One', cursive; font-size: 120px; color: #ff4444; }

        @media (max-width: 900px) { .top-row-container { flex-direction: column; } .bottom-panel { flex-direction: column; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container"><img src="FREMPO (2)-Photoroom (1).png" alt="FREMPO" class="site-logo"></div>
</div>    

<div class="top-row-container">
    <div class="instructions">
        <h3>How to Use Frempo</h3>
        <div class="instructions-list">
            <div class="instruction-item"><div class="instruction-number">1</div>Set FPS and frame range</div>
            <div class="instruction-item"><div class="instruction-number">2</div>Press Space to start countdown</div>
            <div class="instruction-item"><div class="instruction-number">3</div>Tap Space to drop red markers</div>
            <div class="instruction-item"><div class="instruction-number">4</div>Hover markers to see exact frame</div>
        </div>
    </div>
    <div class="controls-section">
        <label class="control-label">Frame Rate</label>
        <select id="frameRate" class="control-input">
            <option value="" disabled selected>Select Frame Rate</option>
            <option value="24">24 FPS</option>
            <option value="25">25 FPS</option>
            <option value="30">30 FPS</option>
            <option value="60">60 FPS</option>
            <option value="120">120 FPS</option>
            <option value="240">240 FPS</option>
        </select>
        <div class="range-inputs">
            <div class="range-input-group"><label>Start</label><input id="rangeStart" type="number" value="0"></div>
            <div class="range-input-group"><label>End</label><input id="rangeEnd" type="number" value="100"></div>
        </div>
    </div>
</div>

<div class="timeline-container">
    <div class="timeline-info">
        <div><p style="font-size:12px; color:#999">CURRENT</p><div class="info-value" id="currentFrame">0</div></div>
        <div><p style="font-size:12px; color:#999">BEATS</p><div class="info-value" id="tapCount">0</div></div>
        <div><p style="font-size:12px; color:#999">STATUS</p><div class="info-value" id="status" style="font-size:18px; color:#999">Ready</div></div>
    </div>
    <div class="timeline-ruler-wrapper" id="rulerWrapper">
        <div class="timeline-ruler" id="timelineRuler"></div>
        <div class="playhead" id="playhead" style="display:none;left:0;"></div>
    </div>
    <div class="scrubber-section">
        <span class="scrubber-label">Scale &amp; Pan</span>
        <div class="scrubber-track" id="scrubberTrack">
            <div class="scrubber-bar" id="scrubberBar">
                <div class="scrubber-handle left" id="scrubHandleLeft"></div>
                <div class="scrubber-handle right" id="scrubHandleRight"></div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-panel">
    <div><p style="font-size:12px; color:#999">RANGE</p><div class="stats-value" style="font-family:'Fredoka One'"><span id="displayRangeStart">0</span>–<span id="displayRangeEnd">100</span></div></div>
    <div class="control-buttons">
        <button id="startButton" class="start-button">▶ START (Space)</button>
        <button id="tapButton" class="start-button" style="background:#ff6b6b">● TAP BEAT</button>
        <button id="resetBtn" class="reset-button">↺ Reset</button>
    </div>
</div>

<div class="countdown-overlay" id="countdownOverlay"><div id="countdownNumber" class="countdown-number"></div></div>

<script>
const frameRateSelect = document.getElementById('frameRate'), startButton = document.getElementById('startButton');
const tapButton = document.getElementById('tapButton'), resetBtn = document.getElementById('resetBtn');
const rangeStartInput = document.getElementById('rangeStart'), rangeEndInput = document.getElementById('rangeEnd');
const displayRangeStart = document.getElementById('displayRangeStart'), displayRangeEnd = document.getElementById('displayRangeEnd');
const timelineRuler = document.getElementById('timelineRuler'), rulerWrapper = document.getElementById('rulerWrapper');
const playheadEl = document.getElementById('playhead'), currentFrameDisp = document.getElementById('currentFrame');
const tapCountDisp = document.getElementById('tapCount'), statusDisp = document.getElementById('status');
const scrubberTrack = document.getElementById('scrubberTrack'), scrubberBar = document.getElementById('scrubberBar');

let beatMarkers = [], frameRate = null, currentFrameF = 0, isRunning = false, runStartTime = null, viewStart = 0, viewEnd = 1;

function getRange() { return { start: parseInt(rangeStartInput.value) || 0, end: parseInt(rangeEndInput.value) || 100 }; }

async function startCountdown() {
    if (isRunning) return;
    if (!frameRateSelect.value) { alert("Please select a Frame Rate first!"); return; }
    
    // Auto-reset if we are starting a new run after a completion
    if (statusDisp.textContent === 'Complete') reset();

    countdownOverlay.classList.add('active');
    countdownNumber.textContent = 'Ready';
    await new Promise(r => setTimeout(r, 1000));
    for (let i = 3; i > 0; i--) { countdownNumber.textContent = i; await new Promise(r => setTimeout(r, 800)); }
    countdownOverlay.classList.remove('active');
    
    isRunning = true; statusDisp.textContent = 'Running'; statusDisp.style.color = '#ff4444';
    runStartTime = performance.now();
    playheadEl.style.display = 'block';
    requestAnimationFrame(updateLoop);
}

function updateLoop(now) {
    if (!isRunning) return;
    const { start, end } = getRange();
    const total = end - start;
    currentFrameF = ((now - runStartTime) / 1000) * parseInt(frameRateSelect.value);
    
    if (currentFrameF >= total) {
        currentFrameF = total; isRunning = false;
        statusDisp.textContent = 'Complete'; statusDisp.style.color = '#667eea';
    }
    currentFrameDisp.textContent = start + Math.floor(currentFrameF);
    positionElements(total);
    if (isRunning) requestAnimationFrame(updateLoop);
}

function positionElements(total) {
    const width = rulerWrapper.clientWidth - 30;
    const scrollOffset = viewStart * total;
    const visibleRange = (viewEnd - viewStart) * total;
    const fraction = (currentFrameF - scrollOffset) / (visibleRange || 1);
    playheadEl.style.left = (fraction * width + 15) + 'px';
}

function drawRuler() {
    const { start, end } = getRange();
    const total = end - start;
    const width = rulerWrapper.clientWidth - 30;
    timelineRuler.innerHTML = '';

    for (let i = 0; i <= total; i++) {
        const xPct = i / total;
        if (xPct < viewStart || xPct > viewEnd) continue;
        const xPx = ((xPct - viewStart) / (viewEnd - viewStart)) * width + 15;

        // FIX 3: clamp last label so it doesn't overflow right edge
        const isMajor = (i % 10 === 0);
        const tick = document.createElement('div');
        tick.style.cssText = `position:absolute; left:${xPx}px; top:20px; width:${isMajor?2:1}px; height:${isMajor?40:20}px; background:#667eea; opacity:${isMajor?0.8:0.3};`;
        timelineRuler.appendChild(tick);

        if (isMajor) {
            const lbl = document.createElement('div');
            const labelText = String(start + i);
            const approxLabelWidth = labelText.length * 7;
            const clampedLeft = Math.min(xPx + 4, rulerWrapper.clientWidth - 4 - approxLabelWidth);
            lbl.style.cssText = `position:absolute; left:${clampedLeft}px; top:65px; font-size:10px; color:#999; font-weight:600;`;
            lbl.textContent = labelText;
            timelineRuler.appendChild(lbl);
        }
    }

    // Draw Markers
    beatMarkers.forEach(bf => {
        const xPct = (bf - start) / total;
        if (xPct < viewStart || xPct > viewEnd) return;
        const xPx = ((xPct - viewStart) / (viewEnd - viewStart)) * width + 15;
        const bm = document.createElement('div');
        bm.style.cssText = `position:absolute; left:${xPx-2}px; top:15px; width:4px; height:50px; background:#ff4444; cursor:pointer; z-index:20; border-radius:2px;`;
        const tip = document.createElement('div');
        tip.className = 'marker-tooltip'; tip.textContent = `F: ${bf}`;
        bm.appendChild(tip);
        bm.onmouseenter = () => tip.style.display = 'block';
        bm.onmouseleave = () => tip.style.display = 'none';
        bm.onclick = (e) => { e.stopPropagation(); removeBeat(bf); };
        timelineRuler.appendChild(bm);
    });
}

function addBeat() {
    if (!isRunning) return;
    const f = getRange().start + Math.round(currentFrameF);
    if (!beatMarkers.includes(f)) {
        beatMarkers.push(f);
        tapCountDisp.textContent = beatMarkers.length;
        drawRuler();
    }
}

function removeBeat(f) {
    beatMarkers = beatMarkers.filter(b => b !== f);
    tapCountDisp.textContent = beatMarkers.length;
    drawRuler();
}

function reset() {
    isRunning = false; currentFrameF = 0; beatMarkers = []; viewStart = 0; viewEnd = 1;
    statusDisp.textContent = 'Ready'; statusDisp.style.color = '#999';
    playheadEl.style.display = 'none'; tapCountDisp.textContent = 0;
    currentFrameDisp.textContent = 0;
    updateDisplay(); drawRuler(); updateScrubber();
}

function updateScrubber() {
    const tw = scrubberTrack.clientWidth;
    scrubberBar.style.left = (viewStart * tw) + 'px';
    scrubberBar.style.width = ((viewEnd - viewStart) * tw) + 'px';
}

function updateDisplay() {
    const r = getRange();
    displayRangeStart.textContent = r.start;
    displayRangeEnd.textContent = r.end;
}

(function initScrubber() {
    let dragging = null, startX, startVS, startVE;
    const down = (e, type) => { e.preventDefault(); dragging = type; startX = e.clientX; startVS = viewStart; startVE = viewEnd; };
    scrubberBar.onmousedown = (e) => { if(e.target.className.includes('handle')) return; down(e, 'pan'); };
    document.getElementById('scrubHandleLeft').onmousedown = (e) => down(e, 'left');
    document.getElementById('scrubHandleRight').onmousedown = (e) => down(e, 'right');
    window.onmousemove = (e) => {
        if (!dragging) return;
        const delta = (e.clientX - startX) / scrubberTrack.clientWidth;
        if (dragging === 'pan') { let w = startVE - startVS; viewStart = Math.max(0, Math.min(1 - w, startVS + delta)); viewEnd = viewStart + w; }
        else if (dragging === 'left') { viewStart = Math.max(0, Math.min(viewEnd - 0.05, startVS + delta)); }
        else if (dragging === 'right') { viewEnd = Math.min(1, Math.max(viewStart + 0.05, startVE + delta)); }
        updateScrubber(); drawRuler(); positionElements(getRange().end - getRange().start);
    };
    window.onmouseup = () => dragging = null;
})();

startButton.onclick = startCountdown;
tapButton.onclick = addBeat;
resetBtn.onclick = reset;
[rangeStartInput, rangeEndInput, frameRateSelect].forEach(el => el.oninput = () => { updateDisplay(); drawRuler(); });
window.onkeydown = (e) => { if (e.code === 'Space') { e.preventDefault(); isRunning ? addBeat() : startCountdown(); } };
window.onresize = () => { drawRuler(); updateScrubber(); };
window.onload = () => { updateDisplay(); drawRuler(); updateScrubber(); };
</script>
</body>
</html>
