<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frempo - Beat Tempo for Animators</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #252525;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        h1 {
            font-size: 24px;
            color: #667eea;
            margin: 0;
        }

        .controls-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        .control-input, .control-button {
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #404040;
            color: #e0e0e0;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-input:hover {
            border-color: #667eea;
        }

        .control-input:focus {
            outline: none;
            border-color: #667eea;
            background: #2f2f2f;
        }

        .control-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .control-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .control-button:active {
            transform: translateY(0);
        }

        .audio-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .audio-upload-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .audio-input {
            display: none;
        }

        .upload-btn {
            padding: 8px 16px;
            background: #2a2a2a;
            border: 1px solid #404040;
            color: #e0e0e0;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-btn:hover {
            border-color: #667eea;
        }

        .audio-filename {
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #404040;
            border-radius: 3px;
            font-size: 12px;
            color: #888;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .audio-controls {
            display: flex;
            gap: 5px;
        }

        .audio-btn {
            padding: 6px 12px;
            background: #2a2a2a;
            border: 1px solid #404040;
            color: #e0e0e0;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .audio-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .audio-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .timeline-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 5px;
            padding: 15px;
            overflow: hidden;
        }

        .timeline-header {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            min-height: 100px;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 140px;
            padding-right: 15px;
            border-right: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .info-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        .info-value {
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .timeline-ruler-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .timeline-ruler {
            display: flex;
            gap: 0px;
            align-items: flex-end;
            padding: 0 5px;
            min-width: min-content;
            height: 60px;
            background: #222;
            border-radius: 3px;
            border: 1px solid #2a2a2a;
            position: relative;
        }

        .frame-marker {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            width: 25px;
            height: 100%;
            flex-shrink: 0;
        }

        .frame-marker.major {
            width: 30px;
        }

        .frame-tick {
            width: 1px;
            background: #404040;
            flex-grow: 1;
        }

        .frame-marker.major .frame-tick {
            background: #666;
            width: 2px;
        }

        .frame-number {
            font-size: 8px;
            color: #666;
            text-align: center;
            height: 10px;
            width: 100%;
            line-height: 10px;
        }

        .beat-marker {
            position: absolute;
            bottom: 0;
            width: 3px;
            height: 40px;
            background: #ff3333;
            opacity: 0.95;
            border-radius: 1px;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.9), inset 0 0 4px rgba(255, 100, 100, 0.5);
            z-index: 10;
        }

        .beat-marker::after {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 7px;
            background: #ff6666;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 51, 51, 0.8);
        }

        .beat-number {
            position: absolute;
            bottom: -18px;
            font-size: 9px;
            color: #ff6666;
            white-space: nowrap;
            font-weight: bold;
            left: 50%;
            transform: translateX(-50%);
        }

        .waveform-section {
            display: none;
            flex-direction: column;
            gap: 8px;
            background: #222;
            padding: 12px;
            border-radius: 3px;
            border: 1px solid #2a2a2a;
        }

        .waveform-section.active {
            display: flex;
        }

        .waveform-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        .waveform-canvas {
            border: 1px solid #2a2a2a;
            border-radius: 3px;
            background: #1a1a1a;
            height: 80px;
        }

        .bottom-panel {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-radius: 5px;
            border: 1px solid #2a2a2a;
            align-items: flex-end;
        }

        .stats-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        .stats-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .separator {
            width: 1px;
            height: 40px;
            background: #2a2a2a;
        }

        .tap-button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            transition: all 0.2s ease;
            margin-left: auto;
        }

        .tap-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .tap-button:active {
            transform: translateY(0);
        }

        .privacy-notice {
            text-align: center;
            color: #666;
            font-size: 10px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #2a2a2a;
        }

        @media (max-width: 1200px) {
            .controls-section {
                grid-template-columns: 1fr 1fr;
            }

            .audio-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 FREMPO</h1>
        <div style="color: #666; font-size: 12px;">Beat Tempo Timeline</div>
    </div>

    <div class="controls-section">
        <div class="control-group">
            <label class="control-label">Frame Rate</label>
            <select id="frameRate" class="control-input">
                <option value="12">12 FPS (Animation)</option>
                <option value="24">24 FPS (Film)</option>
                <option value="25">25 FPS (PAL)</option>
                <option value="30" selected>30 FPS (NTSC)</option>
                <option value="48">48 FPS</option>
                <option value="50">50 FPS (PAL High)</option>
                <option value="60">60 FPS (High Speed)</option>
                <option value="120">120 FPS (Ultra High)</option>
            </select>
        </div>

        <div class="control-group">
            <label class="control-label">BPM</label>
            <input id="bpmInput" type="number" class="control-input" value="0" readonly>
        </div>

        <div class="control-group">
            <label class="control-label">Frames Per Beat</label>
            <input id="framesPerBeatInput" type="number" class="control-input" value="0" readonly>
        </div>

        <div class="control-group">
            <label class="control-label">Action</label>
            <button id="resetButton" class="control-button">Reset Timeline</button>
        </div>
    </div>

    <div class="audio-section">
        <div class="audio-upload-wrapper">
            <input type="file" id="audioInput" class="audio-input" accept="audio/*">
            <button id="uploadBtn" class="upload-btn">📁 Load Audio</button>
            <div class="audio-filename" id="audioFilename">No audio loaded</div>
        </div>
        <div class="audio-controls">
            <button id="playBtn" class="audio-btn">▶ Play</button>
            <button id="pauseBtn" class="audio-btn">⏸ Pause</button>
            <button id="clearAudioBtn" class="audio-btn">✕ Clear</button>
        </div>
    </div>

    <div class="waveform-section" id="waveformSection">
        <div class="waveform-label">Waveform</div>
        <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
    </div>

    <div class="timeline-container">
        <div class="timeline-header">
            <div class="info-panel">
                <div class="info-row">
                    <div class="info-label">Current Frame</div>
                    <div class="info-value" id="currentFrame">0</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Next Beat</div>
                    <div class="info-value" id="nextBeatFrame">—</div>
                </div>
            </div>
            <div class="timeline-ruler-wrapper">
                <div class="timeline-ruler" id="timelineRuler"></div>
            </div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="stats-group">
            <div class="stats-label">Taps Recorded</div>
            <div class="stats-value" id="tapCount">0</div>
        </div>
        <div class="separator"></div>
        <div class="stats-group">
            <div class="stats-label">Frames Per Measure</div>
            <div class="stats-value" id="framesPerMeasure">0</div>
        </div>
        <div class="separator"></div>
        <div class="stats-group">
            <div class="stats-label">Status</div>
            <div class="stats-value" id="status" style="color: #666;">Ready</div>
        </div>
        <button id="tapButton" class="tap-button">TAP TEMPO</button>
    </div>

    <div class="privacy-notice">
        🔒 All audio processing is done locally in your browser. No files are saved or sent anywhere.
    </div>

    <script>
        // DOM Elements
        const frameRateSelect = document.getElementById('frameRate');
        const bpmInput = document.getElementById('bpmInput');
        const framesPerBeatInput = document.getElementById('framesPerBeatInput');
        const resetButton = document.getElementById('resetButton');
        const tapButton = document.getElementById('tapButton');
        const timelineRuler = document.getElementById('timelineRuler');
        const currentFrameDisplay = document.getElementById('currentFrame');
        const nextBeatFrameDisplay = document.getElementById('nextBeatFrame');
        const tapCountDisplay = document.getElementById('tapCount');
        const framesPerMeasureDisplay = document.getElementById('framesPerMeasure');
        const statusDisplay = document.getElementById('status');

        // Audio Elements
        const audioInput = document.getElementById('audioInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const audioFilename = document.getElementById('audioFilename');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const clearAudioBtn = document.getElementById('clearAudioBtn');
        const waveformSection = document.getElementById('waveformSection');
        const waveformCanvas = document.getElementById('waveformCanvas');

        // State
        let tapTimes = [];
        let frameRate = 30;
        let currentFrame = 0;
        let isRunning = false;
        let runStartTime = null;

        // Audio
        let audioContext = null;
        let audioBuffer = null;
        let audioSource = null;
        let analyser = null;
        let isPlaying = false;

        // Initialize audio context
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Calculate BPM from tap times
        function calculateBPM() {
            if (tapTimes.length < 2) return 0;

            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) {
                intervals.push(tapTimes[i] - tapTimes[i - 1]);
            }

            const averageInterval = intervals.reduce((a, b) => a + b) / intervals.length;
            const bpm = Math.round(60000 / averageInterval);
            return Math.max(20, Math.min(300, bpm));
        }

        // Draw timeline with beat markers
        function drawTimeline() {
            timelineRuler.innerHTML = '';
            const bpm = calculateBPM();
            const framesPerBeat = bpm > 0 ? Math.round(frameRate / (bpm / 60)) : 0;

            // Calculate timeline range based on taps
            const maxFrames = Math.max(240, (tapTimes.length > 1 ? (tapTimes[tapTimes.length - 1] - tapTimes[0]) * frameRate / 1000 : 0) + 120);

            for (let f = 0; f < maxFrames; f += 1) {
                const marker = document.createElement('div');
                const isMajor = f % 10 === 0;
                
                marker.className = isMajor ? 'frame-marker major' : 'frame-marker';

                const tick = document.createElement('div');
                tick.className = 'frame-tick';

                const label = document.createElement('div');
                label.className = 'frame-number';
                if (isMajor) {
                    label.textContent = f;
                }

                marker.appendChild(tick);
                marker.appendChild(label);

                // Add beat markers
                if (bpm > 0 && framesPerBeat > 0 && tapTimes.length > 0) {
                    // Calculate frame position for each beat
                    const firstTapFrame = 0;
                    for (let beatIndex = 0; beatIndex < 20; beatIndex++) {
                        const beatFrame = firstTapFrame + (beatIndex * framesPerBeat);
                        if (Math.abs(beatFrame - f) < 0.5) {
                            const beatMarker = document.createElement('div');
                            beatMarker.className = 'beat-marker';
                            beatMarker.innerHTML = `<div class="beat-number">${beatIndex}</div>`;
                            marker.appendChild(beatMarker);
                            break;
                        }
                    }
                }

                timelineRuler.appendChild(marker);
            }
        }

        // Calculate next beat frame
        function calculateNextBeatFrame() {
            const bpm = calculateBPM();
            if (bpm <= 0 || tapTimes.length === 0 || !isRunning) {
                return '—';
            }

            const framesPerBeat = Math.round(frameRate / (bpm / 60));
            const elapsedMs = Date.now() - runStartTime;
            const elapsedFrames = Math.floor(elapsedMs * frameRate / 1000);
            
            const nextBeat = Math.ceil(elapsedFrames / framesPerBeat) * framesPerBeat;
            const distance = nextBeat - elapsedFrames;
            
            return distance > 0 ? nextBeat.toString() : '—';
        }

        // Update display
        function updateDisplay() {
            const bpm = calculateBPM();
            bpmInput.value = bpm;

            if (bpm > 0) {
                const framesPerBeat = Math.round(frameRate / (bpm / 60));
                const framesPerMeasure = framesPerBeat * 4;

                framesPerBeatInput.value = framesPerBeat;
                framesPerMeasureDisplay.textContent = framesPerMeasure;
            } else {
                framesPerBeatInput.value = 0;
                framesPerMeasureDisplay.textContent = 0;
            }

            tapCountDisplay.textContent = tapTimes.length;
            nextBeatFrameDisplay.textContent = calculateNextBeatFrame();

            if (tapTimes.length === 0) {
                statusDisplay.textContent = 'Ready';
                statusDisplay.style.color = '#666';
            } else if (tapTimes.length === 1) {
                statusDisplay.textContent = 'Tap again...';
                statusDisplay.style.color = '#888';
            } else {
                statusDisplay.textContent = '✓ Locked';
                statusDisplay.style.color = '#67dd7f';
            }

            drawTimeline();
        }

        // Tap button handler
        tapButton.addEventListener('click', () => {
            const now = Date.now();

            // Start running if not already
            if (!isRunning) {
                isRunning = true;
                runStartTime = now;
                currentFrame = 0;
            }

            // Reset if too much time has passed
            if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 4000) {
                tapTimes = [];
            }

            tapTimes.push(now);

            // Keep only last 8 taps
            if (tapTimes.length > 8) {
                tapTimes.shift();
            }

            // Visual feedback
            tapButton.style.transform = 'scale(0.95)';
            setTimeout(() => {
                tapButton.style.transform = '';
            }, 100);

            updateDisplay();
        });

        // Frame rate change
        frameRateSelect.addEventListener('change', (e) => {
            frameRate = parseInt(e.target.value);
            updateDisplay();
        });

        // Reset button
        resetButton.addEventListener('click', () => {
            tapTimes = [];
            currentFrame = 0;
            isRunning = false;
            currentFrameDisplay.textContent = '0';
            updateDisplay();
        });

        // Audio file upload
        uploadBtn.addEventListener('click', () => {
            audioInput.click();
        });

        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadAudio(file);
            }
        });

        // Drag and drop
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                loadAudio(file);
            }
        });

        // Load audio
        function loadAudio(file) {
            initAudioContext();
            audioFilename.textContent = file.name;

            const reader = new FileReader();
            reader.onload = (event) => {
                audioContext.decodeAudioData(event.target.result, (buffer) => {
                    audioBuffer = buffer;
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;

                    // Draw waveform
                    const rawData = new Float32Array(buffer.getChannelData(0));
                    const samples = rawData.length;
                    const blockSize = Math.floor(samples / 256);
                    const filteredData = [];

                    for (let i = 0; i < 256; i++) {
                        let sum = 0;
                        for (let j = 0; j < blockSize; j++) {
                            sum += Math.abs(rawData[i * blockSize + j]);
                        }
                        filteredData.push((sum / blockSize) * 255);
                    }

                    drawWaveform(new Uint8Array(filteredData));
                    waveformSection.classList.add('active');
                }, (error) => {
                    console.error('Error decoding audio:', error);
                    audioFilename.textContent = 'Error loading file';
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // Draw waveform
        function drawWaveform(dataArray) {
            const ctx = waveformCanvas.getContext('2d');
            const width = waveformCanvas.offsetWidth;
            const height = waveformCanvas.offsetHeight;

            waveformCanvas.width = width;
            waveformCanvas.height = height;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 1;
            ctx.beginPath();

            const bufferLength = dataArray.length;
            const sliceWidth = width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * height) / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(width, height / 2);
            ctx.stroke();
        }

        // Play button
        playBtn.addEventListener('click', () => {
            if (!audioBuffer || !audioContext) return;

            if (isPlaying) {
                audioSource.stop();
                isPlaying = false;
                playBtn.classList.remove('active');
                playBtn.textContent = '▶ Play';
                return;
            }

            audioSource = audioContext.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(analyser);
            analyser.connect(audioContext.destination);
            audioSource.start(0);
            isPlaying = true;
            playBtn.classList.add('active');
            playBtn.textContent = '⏹ Stop';

            audioSource.onended = () => {
                isPlaying = false;
                playBtn.classList.remove('active');
                playBtn.textContent = '▶ Play';
            };
        });

        // Pause button
        pauseBtn.addEventListener('click', () => {
            if (isPlaying && audioSource) {
                audioSource.stop();
                isPlaying = false;
                playBtn.classList.remove('active');
                playBtn.textContent = '▶ Play';
            }
        });

        // Clear audio
        clearAudioBtn.addEventListener('click', () => {
            if (isPlaying && audioSource) {
                audioSource.stop();
                isPlaying = false;
                playBtn.classList.remove('active');
                playBtn.textContent = '▶ Play';
            }
            audioBuffer = null;
            audioSource = null;
            analyser = null;
            audioFilename.textContent = 'No audio loaded';
            waveformSection.classList.remove('active');
            audioInput.value = '';
        });

        // Initialize
        updateDisplay();

        // Update display every frame
        let lastFrameUpdate = 0;
        function animationLoop() {
            const now = Date.now();
            if (now - lastFrameUpdate >= 16) {
                if (isRunning) {
                    currentFrame = Math.floor((Date.now() - runStartTime) * frameRate / 1000);
                    currentFrameDisplay.textContent = currentFrame;
                    nextBeatFrameDisplay.textContent = calculateNextBeatFrame();
                }
                lastFrameUpdate = now;
            }
            requestAnimationFrame(animationLoop);
        }
        animationLoop();
    </script>
</body>
</html>
