<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frempo - Beat Tempo for Animators</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            font-weight: 400;
            letter-spacing: 2px;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .instructions {
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 22px 25px;
            margin-bottom: 25px;
        }
        .instructions h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 400;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 0.5px;
        }
        .instructions-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
        }
        .instruction-item { display: flex; gap: 12px; align-items: flex-start; }

            background: white;
            color: #667eea;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 700;
            font-family: 'Fredoka One', cursive;
            font-size: 14px;
        }
        .instruction-text { color: white; font-size: 14px; line-height: 1.5; padding-top: 3px; }

            background: white;

            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #667eea;
            font-weight: 600;
        }
